<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/tablas-para-juli/manifest.json" />
  <meta name="description" content="Aprende las tablas de multiplicar del 2 al 9 con conexiones cruzadas y voz en español." />
  <meta name="author" content="Yamid Cueto Mazo" />
  <meta name="robots" content="index, follow" />

  <title>Tablas para Juli 🎓</title>

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Tablas para Juli" />
  <meta property="og:title" content="Tablas para Juli 🎓 — Aprende las tablas de multiplicar" />
  <meta property="og:description" content="Aprende las tablas del 2 al 9 con animaciones, conexiones conmutativas, quiz interactivo y reconocimiento de voz en español. ¡Gratis y sin instalar nada!" />
  <meta property="og:url" content="https://yamicueto.github.io/tablas-para-juli/" />
  <meta property="og:image" content="https://github.com/YamiCueto.png" />
  <meta property="og:image:alt" content="Yamid Cueto — creador de Tablas para Juli" />
  <meta property="og:image:width" content="460" />
  <meta property="og:image:height" content="460" />
  <meta property="og:locale" content="es_ES" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:site" content="@YamiDev" />
  <meta name="twitter:creator" content="@YamiDev" />
  <meta name="twitter:title" content="Tablas para Juli 🎓 — Aprende las tablas de multiplicar" />
  <meta name="twitter:description" content="Aprende las tablas del 2 al 9 con animaciones, quiz y reconocimiento de voz en español. ¡Gratis!" />
  <meta name="twitter:image" content="https://github.com/YamiCueto.png" />
  <meta name="twitter:image:alt" content="Yamid Cueto — creador de Tablas para Juli" />

  <!-- Canonical -->
  <link rel="canonical" href="https://yamicueto.github.io/tablas-para-juli/" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <link rel="apple-touch-icon" href="/tablas-para-juli/icons/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-icon">🎓</div>
    <h1 class="splash-title">Tablas para Juli</h1>
    <p class="splash-sub">Aprende las tablas de multiplicar del 2 al 9</p>
    <button id="splash-btn">¡Empezar! ✨</button>
  </div>
</div>

<!-- App -->
<div id="app" class="app-hidden">

  <canvas id="canvas-overlay"></canvas>

  <header>
    <div class="header-inner">
      <span class="header-icon">🎓</span>
      <div class="header-text">
        <h1>Tablas para Juli</h1>
        <p>Toca una fila para ver su <strong>pareja conmutativa</strong></p>
      </div>
      <button id="quiz-btn" title="Iniciar Quiz">🧠</button>
      <button id="mute-btn" title="Activar / silenciar voz" aria-label="Silenciar voz">
        <span id="mute-icon">🔊</span>
      </button>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item">
      <span class="legend-dot legend-dot--active"></span>
      Fila activa
    </div>
    <div class="legend-item">
      <span class="legend-dot legend-dot--cross"></span>
      Pareja conmutativa
    </div>
    <div class="legend-item">
      <span class="legend-dash"></span>
      Conexión visual
    </div>
  </div>

  <div id="tables-container"></div>

  <!-- Scroll navigation (mobile only) -->
  <div id="scroll-nav">
    <button id="nav-prev" aria-label="Tabla anterior">‹</button>
    <div id="scroll-dots"></div>
    <button id="nav-next" aria-label="Tabla siguiente">›</button>
  </div>

  <footer>
    <p>Hecho con <span class="heart">❤️</span> para <strong>Julieta</strong></p>
  </footer>

  <button id="voice-btn" title="Activar reconocimiento de voz" aria-label="Activar reconocimiento de voz">🎤</button>
  <div id="voice-status"></div>

</div>

<!-- Quiz overlay -->
<div id="quiz-modal" class="quiz-hidden">
  <div class="quiz-card">
    <div class="quiz-top">
      <h2 class="quiz-title">🧠 Quiz</h2>
      <div class="quiz-score"><span id="q-correct">0</span> / <span id="q-total">0</span></div>
      <button id="quiz-close" aria-label="Cerrar quiz">✕</button>
    </div>

    <div id="quiz-progress-bar"><div id="quiz-progress-fill"></div></div>

    <p class="quiz-table-badge" id="q-badge">Tabla del 3</p>
    <p class="quiz-question" id="q-question">3 × 7 = ?</p>

    <div id="quiz-options" class="quiz-options"></div>

    <div id="quiz-feedback" class="quiz-fb-hidden">
      <span id="q-fb-icon"></span>
      <span id="q-fb-text"></span>
    </div>

    <div id="quiz-stars-row"></div>
  </div>
</div>

<!-- Install PWA -->
<div id="install-banner" aria-label="Instalar aplicación" role="complementary">
  <button id="install-btn">📲 Instalar app</button>
</div>

<!-- Onboarding -->
<div id="onboarding" class="onboarding-hidden" role="dialog" aria-label="Tour de bienvenida">
  <div id="onb-spotlight" aria-hidden="true"></div>
  <div id="onb-bubble">
    <div class="onb-dots" id="onb-dots"></div>
    <p id="onb-text"></p>
    <div class="onb-actions">
      <button id="onb-skip">Saltar</button>
      <button id="onb-next">Siguiente →</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
